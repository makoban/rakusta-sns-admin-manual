<svg xmlns="http://www.w3.org/2000/svg" width="980" height="620" viewBox="0 0 980 620" role="img" aria-labelledby="title desc">
  <title id="title">触らない項目</title>
  <desc id="desc">このエラー対応で触らないGraph API Explorer、Render、Instagram Access Token欄を示す図です。</desc>
  <rect width="980" height="620" fill="#f3f6fb"/>
  <text x="70" y="88" fill="#172026" font-family="Arial,'Hiragino Sans','Yu Gothic',sans-serif" font-size="34" font-weight="900">このエラーで触らないもの</text>
  <text x="70" y="124" fill="#66737e" font-family="Arial,'Hiragino Sans','Yu Gothic',sans-serif" font-size="18" font-weight="700">通常の新規顧客追加では、token生成やRender変更はしません。</text>
  <g font-family="Arial,'Hiragino Sans','Yu Gothic',sans-serif">
    <rect x="70" y="180" width="260" height="300" rx="22" fill="#ffffff" stroke="#ffcdc8"/>
    <circle cx="200" cy="262" r="54" fill="#fff3f2" stroke="#b42318" stroke-width="8"/>
    <path d="M168 230 L232 294 M232 230 L168 294" stroke="#b42318" stroke-width="12" stroke-linecap="round"/>
    <text x="104" y="370" fill="#b42318" font-size="22" font-weight="900">Graph API Explorer</text>
    <text x="104" y="410" fill="#7a271a" font-size="16">token生成画面は開きません。</text>
    <rect x="360" y="180" width="260" height="300" rx="22" fill="#ffffff" stroke="#ffcdc8"/>
    <circle cx="490" cy="262" r="54" fill="#fff3f2" stroke="#b42318" stroke-width="8"/>
    <path d="M458 230 L522 294 M522 230 L458 294" stroke="#b42318" stroke-width="12" stroke-linecap="round"/>
    <text x="430" y="370" fill="#b42318" font-size="22" font-weight="900">Render設定</text>
    <text x="394" y="410" fill="#7a271a" font-size="16">INSTAGRAM_ACCESS_TOKENを</text>
    <text x="394" y="436" fill="#7a271a" font-size="16">差し替えません。</text>
    <rect x="650" y="180" width="260" height="300" rx="22" fill="#ffffff" stroke="#ffcdc8"/>
    <circle cx="780" cy="262" r="54" fill="#fff3f2" stroke="#b42318" stroke-width="8"/>
    <path d="M748 230 L812 294 M812 230 L748 294" stroke="#b42318" stroke-width="12" stroke-linecap="round"/>
    <text x="690" y="370" fill="#b42318" font-size="22" font-weight="900">店舗別token</text>
    <text x="684" y="410" fill="#7a271a" font-size="16">Instagram Access Token欄へ</text>
    <text x="684" y="436" fill="#7a271a" font-size="16">新しいtokenを貼りません。</text>
  </g>
</svg>
